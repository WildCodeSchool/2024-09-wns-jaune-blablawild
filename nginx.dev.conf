events {}

http {
    server {
        listen 80;

        location / {
            proxy_pass http://driveup-dev-client:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api {
            proxy_pass http://driveup-dev-server:4100;
        }

        location /visualizer {
            proxy_pass http://driveup-dev-visualizer:8080;
        }
    }
}