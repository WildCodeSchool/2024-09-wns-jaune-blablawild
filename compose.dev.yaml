networks:
  development:
    name: dev-network

services:
  driveup-dev-backend:
    container_name: driveup-dev-backend
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/src:/app/src
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}
      APP_SECRET: ${APP_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      driveup-dev-database :
        condition: service_healthy
    networks:
      - development

  driveup-dev-frontend:
    container_name: driveup-dev-frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev 
    volumes:
      - ./frontend/src/:/app/src/
    environment:
      VITE_GATEWAY_PORT: ${GATEWAY_PORT}
      VITE_BACKEND_HOST: ${BACKEND_HOST}
      VITE_FRONTEND_HOST: ${FRONTEND_HOST}
    depends_on:
      - driveup-dev-backend
    networks:
      - development

  driveup-dev-database:
    container_name: driveup-dev-database
    image: postgres
    volumes:
      - ./persist/data/:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_SCHEMA}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_HOST: ${DB_HOST}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      retries: 5
    networks:
      - development

  driveup-dev-visualizer:
    container_name: driveup-dev-visualizer
    image: adminer
    networks:
      - development

  driveup-dev-gateway: 
    container_name: driveup-dev-gateway
    image: nginx
    restart: always
    ports: 
      - ${GATEWAY_PORT}:80
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf
    networks:
      - development
