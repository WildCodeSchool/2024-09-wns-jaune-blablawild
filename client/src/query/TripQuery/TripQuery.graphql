query GetTrip($data: FilterTripInput!) {
  getTrip(data: $data) {
    id
    departure_time
     departure_city
    arrival_city
    departure_address
    arrival_address
    capacity
    driver {
      id
      firstname
      lastname
      profile {
        image
      }
    }
    price
    bookings {
      id
      seatsCount
      passenger {
        id
        firstname
        lastname
      }
    }
  }
}