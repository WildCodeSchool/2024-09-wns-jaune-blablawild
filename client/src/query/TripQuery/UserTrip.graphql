query GetTripByUser($userId: String!, $filter: String, $asPassenger: Boolean!) {
  getTripByUser(userId: $userId, filter: $filter, asPassenger: $asPassenger) {
    id
    departure_city
    arrival_city
    departure_address
    arrival_address
    price
    passengers {
      firstname
      id
    }
    driver {
      id
      firstname
    }
    capacity
    departure_time
    status
    reviews {
      comment
      reviewRequested
      id
      notation
      date
      sender {
        firstname
        id
      }
      receiver {
        firstname
        id
      }
    }
  }
}
