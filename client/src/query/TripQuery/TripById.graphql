query GetTripById($tripId: String!) {
  getTripById(tripId: $tripId) {
    id
    departure_city
    arrival_city
    departure_time
    departure_address
    price
    arrival_address
    capacity
    status
    bookings {
      id
      seatsCount
      passenger {
        firstname
        id
        profile {
          image
        }
      }
    }
    driver {
      profile {
        image
      }
      firstname
      id
    }
  }
}