query GetEarliestTrips($date: DateTimeISO!, $arrivalCity: String!, $departureCity: String!) {
  getEarliestTrips(date: $date, arrival_city: $arrivalCity, departure_city: $departureCity) {
    arrival_city
    capacity
    departure_city
    departure_time
    id
    price
    driver {
      firstname
      image
      id
    }
    status
  }
}