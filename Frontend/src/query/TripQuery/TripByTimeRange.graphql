query GetTripsByTime($date: DateTimeISO!, $arrivalCity: String!, $departureCity: String!, $time: String!) {
  getTripsByTime(date: $date, arrival_city: $arrivalCity, departure_city: $departureCity, time: $time) {
    arrival_city
    capacity
    departure_city
    departure_time
    id
    price
    driver {
      firstname
      image
      id
    }
    status
  }
}