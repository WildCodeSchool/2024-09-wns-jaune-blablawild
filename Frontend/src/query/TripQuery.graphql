query GetTrip {
  getTrip {
    id
    depature_time
    depature_city
    arrival_city
    driver {
      id
      firstname
      lastname
    }
    price
    passengers {
      id
      firstname
      lastname
    }
  }
}

query GetTripById($tripId: String!) {
  getTripById(tripId: $tripId) {
    id
  }
}
